name: RUN FULL SITE OPTIMIZATION

on:
  workflow_dispatch:

jobs:
  seo_audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run SEO scanner
        run: |
          python main.py
