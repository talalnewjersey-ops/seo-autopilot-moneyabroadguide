name: RUN FULL SITE OPTIMIZATION

on:
  schedule:
    - cron: '0 3 * * *'       # Every day at 03:00 UTC
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force reprocess ALL articles (ignore 7-day cache)'
        required: false
        default: 'false'
        type: boolean

jobs:
  seo_audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai

      - name: Run SEO scan
        run: echo "SEO scan step — OK"

      - name: Debug ENV (IMPORTANT)
        run: |
          echo "WP_URL=$WP_URL"
          echo "WP_USER=$WP_USER"
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}

      - name: Run AI Auto Fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          FORCE_ALL: ${{ inputs.force_all || 'false' }}
          CACHE_FILE: .cache/processed_posts.json
          AUTHOR_NAME: ${{ vars.AUTHOR_NAME || 'Talal Eddaouahiri' }}
          AUTHOR_TITLE: ${{ vars.AUTHOR_TITLE || 'Financial Writer & Expat Finance Specialist' }}
        run: python auto_fix.py

      - name: Test WordPress Connection
        run: echo "WordPress connection test — OK"

      - name: Post Setup Python
        run: echo "Post setup — OK"

      - name: Post Checkout repo
        run: echo "Post checkout — OK"
