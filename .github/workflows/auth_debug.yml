                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "REDIRECT_HTTP_AUTHORIZATION" => $_SERVER["REDIRECT_HTTP_AUTHORIZATION"] ?? null,
